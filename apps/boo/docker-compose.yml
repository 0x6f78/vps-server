services:
  web:
    image: richarvey/nginx-php-fpm:latest
    container_name: boo-web
    restart: unless-stopped
    volumes:
      - ./www:/var/www/html:ro
    networks:
      - traefik-public
    environment:
      - SERVER_NAME=localhost
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.boo.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.boo.entrypoints=websecure"
      - "traefik.http.routers.boo.tls=true"
      - "traefik.http.routers.boo.tls.certresolver=letsencrypt"
      - "traefik.http.services.boo.loadbalancer.server.port=80"

networks:
  traefik-public:
    external: true
